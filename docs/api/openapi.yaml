components:
  schemas:
    Customer:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
    Product:
      type: object
      properties:
        id:
          type: integer
        price:
          type: number
          format: double
        name:
          type: string
        image_url:
          type: string
        description:
          type: string
        category_id:
          type: integer
        variants:
          type: array
          items:
            $ref: '#/components/schemas/Product_Variant'
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'
    Product_Variant:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
        sku:
          type: string
        price:
          type: number
          format: double
        weight:
          type: number
          format: double
        weight_unit:
          type: string
        colour:
          type: string
        stock_quantity:
          type: integer
    Category:
      type: object
      properties:
        id:
          type: integer
        parent_id:
          type: integer
        name:
          type: string
    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        is_allergen:
          type: boolean
        is_vegan:
          type: boolean
        is_natural:
          type: boolean
    Cart:
      type: object
      properties:
        id:
          type: integer
        customer_id:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Cart_Item'
    Cart_Item:
      type: object
      properties:
        cart_id:
          type: integer
        product_variant_id:
          type: integer
        quantity:
          type: integer
    Order:
      type: object
      properties:
        id:
          type: integer
        customer_id:
          type: integer
        status:
          type: string
          enum:
          - pending
          - processing
          - shipped
          - delivered
          - cancelled
        subtotal:
          type: number
          format: double
        shipping_cost:
          type: number
          format: double
        total_amount:
          type: number
          format: double
        shipping_address:
          type: string
        payment_method:
          type: string
        payment_status:
          type: string
          enum:
          - pending
          - successful
          - failed
        items:
          type: array
          items:
            $ref: '#/components/schemas/Order_Item'
    Order_Item:
      type: object
      properties:
        order_id:
          type: integer
        product_id:
          type: integer
        quantity:
          type: integer
    Return_Request:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        customer_id:
          type: integer
        status:
          type: string
          enum:
          - requested
          - approved
          - rejected
          - completed
        reason:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              order_item_id:
                type: integer
              quantity:
                type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    User:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
          enum:
          - admin
          - employee
        email:
          type: string
        name:
          type: string
        phone_number:
          type: string
        language_flag:
          type: string
        status:
          type: string
          enum:
          - available
          - busy
          - offline
          - away
        is_active:
          type: boolean
    Workspace:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        owner_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Conversation:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum:
          - direct
          - group
        name:
          type: string
        created_by:
          type: integer
        participants:
          type: array
          items:
            $ref: '#/components/schemas/User'
    Message:
      type: object
      properties:
        id:
          type: integer
        conversation_id:
          type: integer
        sender_id:
          type: integer
        message:
          type: string
        sent_at:
          type: string
          format: date-time
    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        deadline:
          type: string
          format: date-time
        description:
          type: string
        status:
          type: string
          enum:
          - complete
          - to_do
          - in_progress
          - blocked
    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
          - complete
          - to_do
          - in_progress
          - blocked
        created_by:
          type: integer
        due_date:
          type: string
          format: date-time
        parent_id:
          type: integer
        project_id:
          type: integer
        assignees:
          type: array
          items:
            $ref: '#/components/schemas/User'
    Task_Time_Entry:
      type: object
      properties:
        id:
          type: integer
        task_id:
          type: integer
        employee_id:
          type: integer
        started_at:
          type: string
          format: date-time
        stopped_at:
          type: string
          format: date-time
        duration_seconds:
          type: integer
    Notification:
      type: object
      properties:
        id:
          type: integer
        notification_event_id:
          type: integer
        recipient_user_id:
          type: integer
        read_at:
          type: string
          format: date-time
          nullable: true
        seen_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        event:
          type: object
          properties:
            id:
              type: integer
            actor_user_id:
              type: integer
              nullable: true
            type:
              type: string
              example: task_due_date_changed
            source:
              type: string
              enum:
              - task
              - chat
            task_id:
              type: integer
              nullable: true
            conversation_id:
              type: integer
              nullable: true
            message_id:
              type: integer
              nullable: true
            payload:
              type: object
              nullable: true
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
  responses:
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication is required or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: The request failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum token
    shopifyProxySignature:
      type: apiKey
      in: query
      name: signature
    shopifyWebhookHmac:
      type: apiKey
      in: header
      name: X-Shopify-Hmac-Sha256
