openapi: 3.0.3
info:
  title: Lumi Backend API
  version: 1.0.0
  description: Canonical contract for the routes registered under `/api/v1`. See the maintenance documentation for architecture
    and workflows.
servers:
- url: /api/v1
  description: API path relative to the deployed backend origin
tags:
- name: Admin
  description: Operations for admin.
- name: Admin - Catalog
  description: Operations for admin - catalog.
- name: Admin - Orders
  description: Operations for admin - orders.
- name: Admin - Returns
  description: Operations for admin - returns.
- name: Authentication
  description: Operations for authentication.
- name: Broadcasting
  description: Operations for broadcasting.
- name: Cart
  description: Operations for cart.
- name: Catalog
  description: Operations for catalog.
- name: Chat
  description: Operations for chat.
- name: Checkout
  description: Operations for checkout.
- name: Conversations
  description: Operations for conversations.
- name: Customer
  description: Operations for customer.
- name: Notifications
  description: Operations for notifications.
- name: Order administration
  description: Operations for order administration.
- name: Projects
  description: Operations for projects.
- name: Return administration
  description: Operations for return administration.
- name: Shopify Proxy
  description: Operations for shopify proxy.
- name: Shopify Webhooks
  description: Operations for shopify webhooks.
- name: Shopify proxy cart
  description: Operations for shopify proxy cart.
- name: Shopify proxy wishlist
  description: Operations for shopify proxy wishlist.
- name: Shopify returns
  description: Operations for shopify returns.
- name: Tasks
  description: Operations for tasks.
- name: Tasks and time tracking
  description: Operations for tasks and time tracking.
- name: Time Tracking
  description: Operations for time tracking.
- name: Users
  description: Operations for users.
- name: Wishlist
  description: Operations for wishlist.
- name: Workspaces
  description: Operations for workspaces.
paths:
  /admin/audit-logs:
    get:
      tags:
      - Admin
      summary: Retrieve audit logs
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A list of audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: get_app_http_controllers_admin_auditlogcontroller_index_admin_audit_logs
      description: 'Access: **Administrator**.'
  /admin/orders:
    get:
      tags:
      - Admin - Orders
      summary: List all orders (admin)
      security:
      - bearerAuth: []
      parameters:
      - name: status
        in: query
        schema:
          type: string
          enum:
          - pending
          - processing
          - shipped
          - delivered
          - cancelled
      - name: customer_id
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: A list of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: get_modules_sales_http_controllers_admin_ordercontroller_index_admin_orders
      description: 'Access: **Active administrator or employee**.'
  /admin/orders/{orderId}:
    get:
      tags:
      - Order administration
      summary: Get order administration
      description: 'Access: **Active administrator or employee**. Implemented by `Modules\Sales\Http\Controllers\Admin\OrderController@show`.'
      operationId: get_modules_sales_http_controllers_admin_ordercontroller_show_admin_orders_orderid
      responses:
        '200':
          description: Successful response
        '422':
          $ref: '#/components/responses/ValidationError'
      security:
      - bearerAuth: []
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
  /admin/products:
    get:
      tags:
      - Admin - Catalog
      summary: List all products (admin)
      security:
      - bearerAuth: []
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
      - name: category_id
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: get_modules_sales_http_controllers_admin_productcontroller_index_admin_products
      description: 'Access: **Active administrator or employee**.'
    post:
      tags:
      - Admin - Catalog
      summary: Create a new product
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Product successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: post_modules_sales_http_controllers_admin_productcontroller_store_admin_products
      description: 'Access: **Active administrator or employee**.'
  /admin/products/{productId}:
    put:
      tags:
      - Admin - Catalog
      summary: Update an existing product
      security:
      - bearerAuth: []
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: Product successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: put_modules_sales_http_controllers_admin_productcontroller_update_admin_products_productid
      description: 'Access: **Active administrator or employee**.'
    delete:
      tags:
      - Admin - Catalog
      summary: Delete an existing product
      security:
      - bearerAuth: []
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Product successfully deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: delete_modules_sales_http_controllers_admin_productcontroller_destroy_admin_products_productid
      description: 'Access: **Active administrator or employee**.'
  /admin/products/{productId}/variants:
    post:
      tags:
      - Admin - Catalog
      summary: Add a variant to a product
      security:
      - bearerAuth: []
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - sku
              - price
              properties:
                sku:
                  type: string
                price:
                  type: number
                  format: double
                weight:
                  type: number
                  format: double
                weight_unit:
                  type: string
                colour:
                  type: string
                stock_quantity:
                  type: integer
                  minimum: 0
      responses:
        '201':
          description: Product variant successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product_Variant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: post_modules_sales_http_controllers_admin_productvariantcontroller_store_admin_products_productid_variants
      description: 'Access: **Active administrator or employee**.'
  /admin/products/{productId}/variants/{variantId}:
    put:
      tags:
      - Admin - Catalog
      summary: Update a product variant
      security:
      - bearerAuth: []
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
      - name: variantId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sku:
                  type: string
                price:
                  type: number
                  format: double
                weight:
                  type: number
                  format: double
                weight_unit:
                  type: string
                colour:
                  type: string
                stock_quantity:
                  type: integer
                  minimum: 0
      responses:
        '200':
          description: Product variant successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product_Variant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: put_modules_sales_http_controllers_admin_productvariantcontroller_update_admin_products_productid_variants_variantid
      description: 'Access: **Active administrator or employee**.'
    patch:
      tags:
      - Admin - Catalog
      summary: Update a product variant's stock quantity
      security:
      - bearerAuth: []
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
      - name: variantId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - stock_quantity
              properties:
                stock_quantity:
                  type: integer
                  minimum: 0
      responses:
        '200':
          description: Stock quantity successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product_Variant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: patch_modules_sales_http_controllers_admin_productvariantcontroller_updatestock_admin_products_productid_variants_variantid
      description: 'Access: **Active administrator or employee**.'
    delete:
      tags:
      - Admin - Catalog
      summary: Delete a product variant
      security:
      - bearerAuth: []
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
      - name: variantId
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Product variant successfully deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: delete_modules_sales_http_controllers_admin_productvariantcontroller_destroy_admin_products_productid_variants_variantid
      description: 'Access: **Active administrator or employee**.'
  /admin/returns:
    get:
      tags:
      - Admin - Returns
      summary: List all return requests
      security:
      - bearerAuth: []
      parameters:
      - name: status
        in: query
        schema:
          type: string
          enum:
          - requested
          - approved
          - rejected
          - completed
      - name: order_id
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: A list of return requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Return_Request'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: get_modules_sales_http_controllers_admin_returnrequestcontroller_index_admin_returns
      description: 'Access: **Active administrator or employee**.'
  /admin/returns/{returnRequestId}:
    get:
      tags:
      - Admin - Returns
      summary: Get return request details by ID
      security:
      - bearerAuth: []
      parameters:
      - name: returnRequestId
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Return request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Return_Request'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: get_modules_sales_http_controllers_admin_returnrequestcontroller_show_admin_returns_returnrequestid
      description: 'Access: **Active administrator or employee**.'
    patch:
      tags:
      - Admin - Returns
      summary: Update a return request (e.g. approve/reject/complete)
      security:
      - bearerAuth: []
      parameters:
      - name: returnRequestId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                  - requested
                  - approved
                  - rejected
                  - completed
      responses:
        '200':
          description: Return request successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Return_Request'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: patch_modules_sales_http_controllers_admin_returnrequestcontroller_updatenotes_admin_returns_returnrequestid
      description: 'Access: **Active administrator or employee**.'
  /admin/returns/{returnRequestId}/approve:
    post:
      tags:
      - Return administration
      summary: Approve return administration
      description: 'Access: **Active administrator or employee**. Implemented by `Modules\Sales\Http\Controllers\Admin\ReturnRequestController@approve`.'
      operationId: post_modules_sales_http_controllers_admin_returnrequestcontroller_approve_admin_returns_returnrequestid_approve
      responses:
        '201':
          description: Successful response
        '422':
          $ref: '#/components/responses/ValidationError'
      security:
      - bearerAuth: []
      parameters:
      - name: returnRequestId
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
  /admin/returns/{returnRequestId}/received:
    post:
      tags:
      - Return administration
      summary: Mark received return administration
      description: 'Access: **Active administrator or employee**. Implemented by `Modules\Sales\Http\Controllers\Admin\ReturnRequestController@markReceived`.'
      operationId: post_modules_sales_http_controllers_admin_returnrequestcontroller_markreceived_admin_returns_returnrequestid_received
      responses:
        '201':
          description: Successful response
        '422':
          $ref: '#/components/responses/ValidationError'
      security:
      - bearerAuth: []
      parameters:
      - name: returnRequestId
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
  /admin/returns/{returnRequestId}/refunded:
    post:
      tags:
      - Return administration
      summary: Mark refunded return administration
      description: 'Access: **Active administrator or employee**. Implemented by `Modules\Sales\Http\Controllers\Admin\ReturnRequestController@markRefunded`.'
      operationId: post_modules_sales_http_controllers_admin_returnrequestcontroller_markrefunded_admin_returns_returnrequestid_refunded
      responses:
        '201':
          description: Successful response
        '422':
          $ref: '#/components/responses/ValidationError'
      security:
      - bearerAuth: []
      parameters:
      - name: returnRequestId
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
  /admin/returns/{returnRequestId}/reject:
    post:
      tags:
      - Return administration
      summary: Reject return administration
      description: 'Access: **Active administrator or employee**. Implemented by `Modules\Sales\Http\Controllers\Admin\ReturnRequestController@reject`.'
      operationId: post_modules_sales_http_controllers_admin_returnrequestcontroller_reject_admin_returns_returnrequestid_reject
      responses:
        '201':
          description: Successful response
        '422':
          $ref: '#/components/responses/ValidationError'
      security:
      - bearerAuth: []
      parameters:
      - name: returnRequestId
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
                  nullable: true
                  maxLength: 2000
  /admin/users:
    get:
      tags:
      - Users
      summary: List all users
      security:
      - bearerAuth: []
      parameters:
      - name: status
        in: query
        schema:
          type: string
          enum:
          - available
          - busy
          - offline
          - away
      - name: role
        in: query
        schema:
          type: string
          enum:
          - admin
          - employee
      responses:
        '200':
          description: A list of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: get_app_http_controllers_admin_usercontroller_index_admin_users
      description: 'Access: **Administrator**.'
    post:
      tags:
      - Users
      summary: Create a new user
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - role
              - email
              - password
              - name
              properties:
                role:
                  type: string
                  enum:
                  - admin
                  - employee
                email:
                  type: string
                password:
                  type: string
                name:
                  type: string
                phone_number:
                  type: string
      responses:
        '201':
          description: User successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: post_app_http_controllers_admin_usercontroller_store_admin_users
      description: 'Access: **Administrator**.'
  /admin/users/{userId}/resend-invite:
    post:
      tags:
      - Users
      summary: Resend an invitation email to a pending user
      security:
      - bearerAuth: []
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Invitation successfully resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: post_app_http_controllers_admin_usercontroller_resendinvite_admin_users_userid_resend_invite
      description: 'Access: **Administrator**.'
  /admin/users/{user}:
    get:
      tags:
      - Users
      summary: Get user by ID
      security:
      - bearerAuth: []
      parameters:
      - name: user
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Employee profile details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: get_app_http_controllers_admin_usercontroller_show_admin_users_user
      description: 'Access: **Administrator**.'
    put:
      tags:
      - Users
      summary: Update user details
      security:
      - bearerAuth: []
      parameters:
      - name: user
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum:
                  - admin
                  - employee
                email:
                  type: string
                name:
                  type: string
                phone_number:
                  type: string
                status:
                  type: string
                  enum:
                  - available
                  - busy
                  - offline
                  - away
      responses:
        '200':
          description: User successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: put_app_http_controllers_admin_usercontroller_update_admin_users_user
      description: 'Access: **Administrator**.'
    patch:
      tags:
      - Users
      summary: Partially update user details
      security:
      - bearerAuth: []
      parameters:
      - name: user
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum:
                  - admin
                  - employee
                email:
                  type: string
                name:
                  type: string
                phone_number:
                  type: string
                status:
                  type: string
                  enum:
                  - available
                  - busy
                  - offline
                  - away
      responses:
        '200':
          description: User successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: patch_app_http_controllers_admin_usercontroller_update_admin_users_user
      description: 'Access: **Administrator**.'
    delete:
      tags:
      - Users
      summary: Deactivate a user
      security:
      - bearerAuth: []
      parameters:
      - name: user
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: User successfully deactivated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: delete_app_http_controllers_admin_usercontroller_destroy_admin_users_user
      description: 'Access: **Administrator**.'
  /auth/login:
    post:
      tags:
      - Authentication
      summary: Employee login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  employee:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: post_app_http_controllers_auth_tokencontroller_store_auth_login
      description: 'Access: **Public**.'
      security: []
  /auth/logout:
    delete:
      tags:
      - Authentication
      summary: Employee logout
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Logout successful
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: delete_app_http_controllers_auth_tokencontroller_destroy_auth_logout
      description: 'Access: **Authenticated user**.'
  /auth/me:
    get:
      tags:
      - Authentication
      summary: Get authenticated employee profile
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Profile details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: get_app_http_controllers_auth_tokencontroller_me_auth_me
      description: 'Access: **Authenticated user**.'
  /auth/me/presence/disconnect:
    post:
      tags:
      - Authentication
      summary: Disconnect user presence
      security: []
      responses:
        '200':
          description: Successfully disconnected presence
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: post_app_http_controllers_auth_tokencontroller_disconnect_auth_me_presence_disconnect
      description: 'Access: **Public**.'
  /auth/me/presence/ping:
    post:
      tags:
      - Authentication
      summary: Ping user presence
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successfully pinged presence
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: post_app_http_controllers_auth_tokencontroller_ping_auth_me_presence_ping
      description: 'Access: **Authenticated user**.'
  /auth/me/status:
    patch:
      tags:
      - Authentication
      summary: Update the authenticated employee's status
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              properties:
                status:
                  type: string
                  enum:
                  - available
                  - busy
                  - offline
                  - away
      responses:
        '200':
          description: Status successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: patch_app_http_controllers_auth_tokencontroller_updatestatus_auth_me_status
      description: 'Access: **Authenticated user**.'
  /auth/phone:
    put:
      tags:
      - Authentication
      summary: Update user phone number
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
