openapi: 3.0.0
info:
  title: E-Commerce API
  version: 1.0.0
  description: OpenAPI specification for the internal shop, customer, cart, and product database schema. Example "api/v1/shop/products"

servers:
  - url: /api/{version}
    description: Main API Server.
    variables:
      version:
        default: v1
        enum:
          - v1
        #          - v2
        description: Select the API version

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Customer:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string

    Product:
      type: object
      properties:
        id:
          type: integer
        price:
          type: number
          format: double
        name:
          type: string
        image_url:
          type: string
        description:
          type: string
        category_id:
          type: integer
        variants:
          type: array
          items:
            $ref: "#/components/schemas/Product_Variant"
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/Ingredient"

    Product_Variant:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
        sku:
          type: string
        price:
          type: number
          format: double
        weight:
          type: number
          format: double
        weight_unit:
          type: string
        colour:
          type: string
        stock_quantity:
          type: integer

    Category:
      type: object
      properties:
        id:
          type: integer
        parent_id:
          type: integer
        name:
          type: string

    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        is_allergen:
          type: boolean
        is_vegan:
          type: boolean
        is_natural:
          type: boolean

    Cart:
      type: object
      properties:
        id:
          type: integer
        customer_id:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/Cart_Item"

    Cart_Item:
      type: object
      properties:
        cart_id:
          type: integer
        product_variant_id:
          type: integer
        quantity:
          type: integer

    Order:
      type: object
      properties:
        id:
          type: integer
        customer_id:
          type: integer
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
        subtotal:
          type: number
          format: double
        shipping_cost:
          type: number
          format: double
        total_amount:
          type: number
          format: double
        shipping_address:
          type: string
        payment_method:
          type: string
        payment_status:
          type: string
          enum: [pending, successful, failed]
        items:
          type: array
          items:
            $ref: "#/components/schemas/Order_Item"

    Order_Item:
      type: object
      properties:
        order_id:
          type: integer
        product_id:
          type: integer
        quantity:
          type: integer

    Wishlist_Item:
      type: object
      properties:
        customer_id:
          type: integer
        product_id:
          type: integer

    Return_Request:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        customer_id:
          type: integer
        status:
          type: string
          enum: [requested, approved, rejected, completed]
        reason:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              order_item_id:
                type: integer
              quantity:
                type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

  responses:
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication is required or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

paths:
  /shop/me:
    get:
      tags:
        - Customer
      summary: Get the authenticated customer's profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Customer profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /shop/products:
    get:
      tags:
        - Catalog
      summary: List all products
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/products/{productId}:
    get:
      tags:
        - Catalog
      summary: Get product details
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details with variants and ingredients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/products/{productId}/variants:
    get:
      tags:
        - Catalog
      summary: List all variants of a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A list of product variants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product_Variant"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/variants/{variantId}:
    get:
      tags:
        - Catalog
      summary: Get product variant details
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product variant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product_Variant"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/ingredients:
    get:
      tags:
        - Catalog
      summary: List all ingredients
      parameters:
        - name: is_allergen
          in: query
          schema:
            type: boolean
        - name: is_vegan
          in: query
          schema:
            type: boolean
        - name: is_natural
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: A list of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"

  /shop/ingredients/{ingredientId}:
    get:
      tags:
        - Catalog
      summary: Get ingredient details
      parameters:
        - name: ingredientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ingredient details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/products/{productId}/ingredients:
    get:
      tags:
        - Catalog
      summary: List ingredients of a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A list of ingredients for the product
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/categories:
    get:
      tags:
        - Catalog
      summary: List all categories
      responses:
        "200":
          description: A list of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /shop/customers/{customerId}:
    get:
      tags:
        - Customer
      summary: Get customer profile
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/customers/{customerId}/cart:
    get:
      tags:
        - Cart
      summary: Get customer cart
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cart details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/customers/{customerId}/cart/items:
    post:
      tags:
        - Cart
      summary: Add item to cart
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_variant_id
                - quantity
              properties:
                product_variant_id:
                  type: integer
                quantity:
                  type: integer
                  minimum: 1
      responses:
        "201":
          description: Item successfully added to cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/customers/{customerId}/cart/items/{productVariantId}:
    put:
      tags:
        - Cart
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
        - name: productVariantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - quantity
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Cart item updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Cart
      summary: Remove item from cart
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
        - name: productVariantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item removed from cart successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/customers/{customerId}/wishlist:
    get:
      tags:
        - Wishlist
      summary: Get customer wishlist
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer wishlist details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags:
        - Wishlist
      summary: Add product to wishlist
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
              properties:
                product_id:
                  type: integer
      responses:
        "201":
          description: Product added to wishlist successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/customers/{customerId}/wishlist/{productId}:
    delete:
      tags:
        - Wishlist
      summary: Remove product from wishlist
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product removed from wishlist successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/orders:
    post:
      tags:
        - Checkout
      summary: Create a new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Order"
      responses:
        "201":
          description: Order successfully created
        "401":
          $ref: "#/components/responses/Unauthorized"

  /shop/customers/{customerId}/orders:
    get:
      tags:
        - Checkout
      summary: Get customer order history
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer order history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/orders/{orderId}:
    get:
      tags:
        - Checkout
      summary: Get order details by ID
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------
  # Admin routes (Modules\Sales\Http\Controllers\Admin\*)
  # ---------------------------------------------------------------------

  /admin/products:
    get:
      tags:
        - Admin - Catalog
      summary: List all products (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Admin - Catalog
      summary: Create a new product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "201":
          description: Product successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/products/{productId}:
    put:
      tags:
        - Admin - Catalog
      summary: Update an existing product
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "200":
          description: Product successfully updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Admin - Catalog
      summary: Delete an existing product
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product successfully deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/products/{productId}/variants:
    post:
      tags:
        - Admin - Catalog
      summary: Add a variant to a product
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sku
                - price
              properties:
                sku:
                  type: string
                price:
                  type: number
                  format: double
                weight:
                  type: number
                  format: double
                weight_unit:
                  type: string
                colour:
                  type: string
                stock_quantity:
                  type: integer
                  minimum: 0
      responses:
        "201":
          description: Product variant successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product_Variant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/products/{productId}/variants/{variantId}:
    put:
      tags:
        - Admin - Catalog
      summary: Update a product variant
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sku:
                  type: string
                price:
                  type: number
                  format: double
                weight:
                  type: number
                  format: double
                weight_unit:
                  type: string
                colour:
                  type: string
                stock_quantity:
                  type: integer
                  minimum: 0
      responses:
        "200":
          description: Product variant successfully updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product_Variant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Admin - Catalog
      summary: Update a product variant's stock quantity
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - stock_quantity
              properties:
                stock_quantity:
                  type: integer
                  minimum: 0
      responses:
        "200":
          description: Stock quantity successfully updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product_Variant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Admin - Catalog
      summary: Delete a product variant
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product variant successfully deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/orders:
    get:
      tags:
        - Admin - Orders
      summary: List all orders (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, processing, shipped, delivered, cancelled]
        - name: customer_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/returns:
    get:
      tags:
        - Admin - Returns
      summary: List all return requests
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [requested, approved, rejected, completed]
        - name: order_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of return requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Return_Request"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/returns/{returnRequestId}:
    get:
      tags:
        - Admin - Returns
      summary: Get return request details by ID
      security:
        - bearerAuth: []
      parameters:
        - name: returnRequestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Return request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Return_Request"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Admin - Returns
      summary: Update a return request (e.g. approve/reject/complete)
      security:
        - bearerAuth: []
      parameters:
        - name: returnRequestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [requested, approved, rejected, completed]
      responses:
        "200":
          description: Return request successfully updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Return_Request"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------
  # Shopify storefront proxy routes (Modules\Sales\Http\Controllers\Shopify\Proxy*)
  # ---------------------------------------------------------------------

  /shopify/proxy/returns:
    post:
      tags:
        - Shopify Proxy
      summary: Submit a return request from the Shopify storefront
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - order_id
                - items
              properties:
                order_id:
                  type: integer
                reason:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      order_item_id:
                        type: integer
                      quantity:
                        type: integer
      responses:
        "201":
          description: Return request successfully submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Return_Request"

  /shopify/proxy/wishlist:
    get:
      tags:
        - Shopify Proxy
      summary: Get wishlist via Shopify storefront proxy
      responses:
        "200":
          description: Customer wishlist details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /shopify/proxy/wishlist/items:
    post:
      tags:
        - Shopify Proxy
      summary: Add item to wishlist via Shopify storefront proxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - shopify_product_id
              properties:
                shopify_product_id:
                  type: string
      responses:
        "201":
          description: Product added to wishlist successfully

  /shopify/proxy/wishlist/items/{shopifyProductId}:
    delete:
      tags:
        - Shopify Proxy
