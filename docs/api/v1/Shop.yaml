openapi: 3.0.0
info:
  title: E-Commerce API
  version: 1.0.0
  description: OpenAPI specification for the e-commerce database schema.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Customer:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string

    Product:
      type: object
      properties:
        id:
          type: integer
        price:
          type: number
          format: double
        name:
          type: string
        image_url:
          type: string
        description:
          type: string
        category_id:
          type: integer
        variants:
          type: array
          items:
            $ref: "#/components/schemas/Product_Variant"
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/Ingredient"

    Product_Variant:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
        sku:
          type: string
        price:
          type: number
          format: double
        weight:
          type: number
          format: double
        weight_unit:
          type: string
        stock_quantity:
          type: integer

    Category:
      type: object
      properties:
        id:
          type: integer
        parent_id:
          type: integer
        name:
          type: string

    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        is_allergen:
          type: boolean
        is_vegan:
          type: boolean
        is_natural:
          type: boolean

    Cart:
      type: object
      properties:
        id:
          type: integer
        customer_id:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/Cart_Item"

    Cart_Item:
      type: object
      properties:
        cart_id:
          type: integer
        product_id:
          type: integer
        quantity:
          type: integer

    Order:
      type: object
      properties:
        id:
          type: integer
        customer_id:
          type: integer
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
        subtotal:
          type: number
          format: double
        shipping_cost:
          type: number
          format: double
        total_amount:
          type: number
          format: double
        shipping_address:
          type: string
        payment_method:
          type: string
        payment_status:
          type: string
          enum: [pending, successful, failed]
        items:
          type: array
          items:
            $ref: "#/components/schemas/Order_Item"

    Order_Item:
      type: object
      properties:
        order_id:
          type: integer
        product_id:
          type: integer
        quantity:
          type: integer

    Wishlist_Item:
      type: object
      properties:
        customer_id:
          type: integer
        product_id:
          type: integer

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

  responses:
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication is required or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

paths:
  /shop/products:
    get:
      tags:
        - Catalog
      summary: List all products
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/products/{productId}:
    get:
      tags:
        - Catalog
      summary: Get product details
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details with variants and ingredients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/categories:
    get:
      tags:
        - Catalog
      summary: List all categories
      responses:
        "200":
          description: A list of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /shop/customers/{customerId}:
    get:
      tags:
        - Customer
      summary: Get customer profile
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/customers/{customerId}/cart:
    get:
      tags:
        - Cart
      summary: Get customer cart
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cart details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/customers/{customerId}/cart/items:
    post:
      tags:
        - Cart
      summary: Add item to cart
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
                - quantity
              properties:
                product_id:
                  type: integer
                quantity:
                  type: integer
                  minimum: 1
      responses:
        "201":
          description: Item successfully added to cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/customers/{customerId}/cart/items/{productId}:
    put:
      tags:
        - Cart
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - quantity
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Cart item updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Cart
      summary: Remove item from cart
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item removed from cart successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/customers/{customerId}/wishlist:
    get:
      tags:
        - Wishlist
      summary: Get customer wishlist
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer wishlist details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags:
        - Wishlist
      summary: Add product to wishlist
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
              properties:
                product_id:
                  type: integer
      responses:
        "201":
          description: Product added to wishlist successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/customers/{customerId}/wishlist/{productId}:
    delete:
      tags:
        - Wishlist
      summary: Remove product from wishlist
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product removed from wishlist successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/orders:
    post:
      tags:
        - Checkout
      summary: Create a new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Order"
      responses:
        "201":
          description: Order successfully created
        "401":
          $ref: "#/components/responses/Unauthorized"

  /shop/customers/{customerId}/orders:
    get:
      tags:
        - Checkout
      summary: Get customer order history
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer order history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /shop/orders/{orderId}:
    get:
      tags:
        - Checkout
      summary: Get order details by ID
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
