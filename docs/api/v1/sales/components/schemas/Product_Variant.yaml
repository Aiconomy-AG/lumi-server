type: object
properties:
  id:
    type: integer
  product_id:
    type: integer
  sku:
    type: string
  name:
    type: string
    nullable: true
    description: Display name of the variant, e.g. "Sex Bomb Shower Gel, 120 g"
  price:
    type: number
    format: double
  weight:
    type: number
    format: double
  weight_unit:
    type: string
  colour:
    type: string
  stock_quantity:
    type: integer
  options:
    type: object
    nullable: true
    additionalProperties:
      type: string
    description: 'Variant option values keyed by option name, e.g. {"Grösse": "100g", "Farbe": "rot"}'
