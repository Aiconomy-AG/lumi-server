openapi: 3.0.0
info:
  title: E-Commerce API
  version: 1.0.0
  description: OpenAPI specification for the e-commerce database schema.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /shop/products:
    $ref: './sales/paths/products.yaml'
  /shop/products/{productId}:
    $ref: './sales/paths/product_details.yaml'
  /shop/products/{productId}/variants:
    $ref: './sales/paths/product_variants.yaml'
  /shop/variants/{variantId}:
    $ref: './sales/paths/product_variant_detail.yaml'
  /shop/ingredients:
    $ref: './sales/paths/ingredients.yaml'
  /shop/ingredients/{ingredientId}:
    $ref: './sales/paths/ingredient_detail.yaml'
  /shop/products/{productId}/ingredients:
    $ref: './sales/paths/product_ingredients.yaml'
  /shop/categories:
    $ref: './sales/paths/categories.yaml'
  /shop/customers/{customerId}:
    $ref: './sales/paths/customer_profile.yaml'
  /shop/customers/{customerId}/cart:
    $ref: './sales/paths/cart.yaml'
  /shop/customers/{customerId}/cart/items:
    $ref: './sales/paths/cart_items.yaml'
  /shop/customers/{customerId}/cart/items/{productId}:
    $ref: './sales/paths/cart_item_detail.yaml'
  /shop/customers/{customerId}/wishlist:
    $ref: './sales/paths/wishlist.yaml'
  /shop/customers/{customerId}/wishlist/{productId}:
    $ref: './sales/paths/wishlist_item.yaml'
  /shop/orders:
    $ref: './sales/paths/orders.yaml'
  /shop/customers/{customerId}/orders:
    $ref: './sales/paths/customer_orders.yaml'
  /shop/orders/{orderId}:
    $ref: './sales/paths/order_detail.yaml'
