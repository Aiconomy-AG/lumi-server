get:
  tags:
    - Checkout
  summary: Get customer order history
  security:
    - bearerAuth: []
  parameters:
    - name: customerId
      in: path
      required: true
      schema:
        type: integer
  responses:
    '200':
      description: Customer order history list
      content:
        application/json:
          schema:
            type: array
            items:
              : '../components/schemas/Order.yaml'
    '401':
      : '../components/responses/Unauthorized.yaml'
    '404':
      : '../components/responses/NotFound.yaml'
