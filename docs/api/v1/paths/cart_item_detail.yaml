put:
  tags:
    - Cart
  summary: Update cart item quantity
  security:
    - bearerAuth: []
  parameters:
    - name: customerId
      in: path
      required: true
      schema:
        type: integer
    - name: productId
      in: path
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - quantity
          properties:
            quantity:
              type: integer
              minimum: 1
  responses:
    '200':
      description: Cart item updated successfully
      content:
        application/json:
          schema:
            : '../components/schemas/Cart.yaml'
    '401':
      : '../components/responses/Unauthorized.yaml'
    '404':
      : '../components/responses/NotFound.yaml'

delete:
  tags:
    - Cart
  summary: Remove item from cart
  security:
    - bearerAuth: []
  parameters:
    - name: customerId
      in: path
      required: true
      schema:
        type: integer
    - name: productId
      in: path
      required: true
      schema:
        type: integer
  responses:
    '200':
      description: Item removed from cart successfully
      content:
        application/json:
          schema:
            : '../components/schemas/Cart.yaml'
    '401':
      : '../components/responses/Unauthorized.yaml'
    '404':
      : '../components/responses/NotFound.yaml'
