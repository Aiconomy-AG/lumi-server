post:
  tags:
    - Chat
  summary: Add participants to a group conversation
  security:
    - bearerAuth: []
  parameters:
    - name: conversationId
      in: path
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - employee_ids
          properties:
            employee_ids:
              type: array
              items:
                type: integer
  responses:
    '200':
      description: Participants added successfully
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Conversation.yaml'
    '401':
      $ref: '../components/responses/Unauthorized.yaml'
    '404':
      $ref: '../components/responses/NotFound.yaml'
