get:
  tags:
    - Tasks
  summary: List all tasks
  security:
    - bearerAuth: []
  parameters:
    - name: status
      in: query
      schema:
        type: string
        enum: [complete, to_do, in_progress, blocked]
    - name: assigneeId
      in: query
      schema:
        type: integer
  responses:
    '200':
      description: A list of tasks
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/Task.yaml'
    '401':
      $ref: '../components/responses/Unauthorized.yaml'

post:
  tags:
    - Tasks
  summary: Create a new task
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - title
            - status
          properties:
            title:
              type: string
            description:
              type: string
            status:
              type: string
              enum: [complete, to_do, in_progress, blocked]
            due_date:
              type: string
              format: date-time
            parent_id:
              type: integer
            project_id:
              type: integer
  responses:
    '201':
      description: Task successfully created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Task.yaml'
    '401':
      $ref: '../components/responses/Unauthorized.yaml'
