put:
  tags:
    - Notifications
  summary: Mark all notifications as read
  security:
    - bearerAuth: []
  responses:
    '200':
      description: All notifications marked as read successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              updated_count:
                type: integer
    '401':
      $ref: '../components/responses/Unauthorized.yaml'
