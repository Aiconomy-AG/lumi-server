get:
  tags:
    - Projects
  summary: List all projects
  security:
    - bearerAuth: []
  parameters:
    - name: status
      in: query
      schema:
        type: string
        enum: [complete, to_do, in_progress, blocked]
  responses:
    '200':
      description: A list of projects
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/Project.yaml'
    '401':
      $ref: '../components/responses/Unauthorized.yaml'

post:
  tags:
    - Projects
  summary: Create a new project
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
            - status
          properties:
            name:
              type: string
            deadline:
              type: string
              format: date-time
            description:
              type: string
            status:
              type: string
              enum: [complete, to_do, in_progress, blocked]
  responses:
    '201':
      description: Project successfully created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Project.yaml'
    '401':
      $ref: '../components/responses/Unauthorized.yaml'
