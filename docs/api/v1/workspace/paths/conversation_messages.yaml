get:
  tags:
    - Chat
  summary: Retrieve messages in a conversation (paginated)
  security:
    - bearerAuth: []
  parameters:
    - name: conversationId
      in: path
      required: true
      schema:
        type: integer
    - name: limit
      in: query
      schema:
        type: integer
        default: 50
  responses:
    '200':
      description: A list of messages
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/Message.yaml'
    '401':
      $ref: '../components/responses/Unauthorized.yaml'
    '404':
      $ref: '../components/responses/NotFound.yaml'

post:
  tags:
    - Chat
  summary: Send a message in a conversation
  security:
    - bearerAuth: []
  parameters:
    - name: conversationId
      in: path
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - message
          properties:
            message:
              type: string
  responses:
    '201':
      description: Message successfully sent
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Message.yaml'
    '401':
      $ref: '../components/responses/Unauthorized.yaml'
    '404':
      $ref: '../components/responses/NotFound.yaml'
