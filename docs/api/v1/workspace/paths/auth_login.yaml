post:
  tags:
    - Authentication
  summary: Employee login
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - email
            - password
          properties:
            email:
              type: string
            password:
              type: string
  responses:
    '200':
      description: Login successful
      content:
        application/json:
          schema:
            type: object
            properties:
              token:
                type: string
              employee:
                $ref: '../components/schemas/Employee.yaml'
    '401':
      $ref: '../components/responses/Unauthorized.yaml'
