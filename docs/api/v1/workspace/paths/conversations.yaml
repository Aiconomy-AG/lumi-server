get:
  tags:
    - Chat
  summary: List all chat conversations
  security:
    - bearerAuth: []
  responses:
    '200':
      description: A list of conversations
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/Conversation.yaml'
    '401':
      $ref: '../components/responses/Unauthorized.yaml'

post:
  tags:
    - Chat
  summary: Start a new direct or group conversation
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - type
            - participant_employee_ids
          properties:
            type:
              type: string
              enum: [direct, group]
            name:
              type: string
            participant_employee_ids:
              type: array
              items:
                type: integer
  responses:
    '201':
      description: Conversation successfully created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Conversation.yaml'
    '401':
      $ref: '../components/responses/Unauthorized.yaml'
