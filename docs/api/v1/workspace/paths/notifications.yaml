get:
  tags:
    - Notifications
  summary: Get authenticated employee notifications
  security:
    - bearerAuth: []
  parameters:
    - name: unreadOnly
      in: query
      schema:
        type: boolean
        default: false
  responses:
    '200':
      description: A list of notifications
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/Notification.yaml'
    '401':
      $ref: '../components/responses/Unauthorized.yaml'
