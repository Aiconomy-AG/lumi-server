openapi: 3.0.0
info:
  title: Workspace Collaboration API
  version: 1.0.0
  description: OpenAPI specification for the internal workspace, employee, chat, and tasks database schema.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /workspace/auth/login:
    $ref: './paths/auth_login.yaml'
  /workspace/profile:
    $ref: './paths/profile.yaml'
  /workspace/employees:
    $ref: './paths/employees.yaml'
  /workspace/employees/{employeeId}:
    $ref: './paths/employee_detail.yaml'
  /workspace/tasks:
    $ref: './paths/tasks.yaml'
  /workspace/tasks/{taskId}:
    $ref: './paths/task_detail.yaml'
  /workspace/tasks/{taskId}/assignees:
    $ref: './paths/task_assignees.yaml'
  /workspace/tasks/{taskId}/assignees/{employeeId}:
    $ref: './paths/task_assignee_detail.yaml'
  /workspace/tasks/{taskId}/time-entries/start:
    $ref: './paths/time_entries_start.yaml'
  /workspace/tasks/{taskId}/time-entries/{entryId}/stop:
    $ref: './paths/time_entries_stop.yaml'
  /workspace/tasks/{taskId}/time-entries:
    $ref: './paths/task_time_entries.yaml'
  /workspace/conversations:
    $ref: './paths/conversations.yaml'
  /workspace/conversations/{conversationId}:
    $ref: './paths/conversation_detail.yaml'
  /workspace/conversations/{conversationId}/messages:
    $ref: './paths/conversation_messages.yaml'
  /workspace/conversations/{conversationId}/participants:
    $ref: './paths/conversation_participants.yaml'
  /workspace/conversations/{conversationId}/participants/{employeeId}:
    $ref: './paths/conversation_participant_detail.yaml'
  /workspace/notifications:
    $ref: './paths/notifications.yaml'
  /workspace/notifications/{notificationId}/read:
    $ref: './paths/notification_read.yaml'
  /workspace/notifications/read-all:
    $ref: './paths/notification_read_all.yaml'
